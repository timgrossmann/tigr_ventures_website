<svg width="160" height="160" viewBox="8 8 144 144" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TIGR Ventures emblem">
  <defs>
    <linearGradient id="gold" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#b8954f"/>
      <stop offset="1" stop-color="#d8bd7e"/>
    </linearGradient>
    <clipPath id="badge">
      <rect x="20" y="20" width="120" height="120" rx="28"/>
    </clipPath>
  </defs>

  <!-- emblem tile (transparent outside) -->
  <rect x="20" y="20" width="120" height="120" rx="28" fill="#0a0a0a" stroke="#26272c" stroke-width="1"/>

  <!-- tiger-stripe / claw slashes -->
  <g clip-path="url(#badge)" stroke="url(#gold)" stroke-width="15" stroke-linecap="round" fill="none">
    <line x1="43.6" y1="80.4" x2="80.4" y2="43.6"/>
    <line x1="56"   y1="104"  x2="104"  y2="56"/>
    <line x1="79.6" y1="116.4" x2="116.4" y2="79.6"/>
  </g>
</svg>
